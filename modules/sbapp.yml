name: sbapp
sources:
  - type: file
    url: https://github.com/markqvist/Sideband/releases/download/2.0.0/sbapp-2.0.0-py3-none-any.whl
    sha256: 97b9959fd57d93347f4981f13e10832ab3ee72a830f94f1e56a25c4ca54bd945
    x-checker-data:
      type: json
      url: https://api.github.com/repos/markqvist/Sideband/releases/latest
      version-query: .tag_name
      url-query: .assets[] | select(.name == ("sbapp-" + $version + "-py3-none-any.whl"))
        | .browser_download_url

buildsystem: simple
builddir: true
build-commands:
  - pip3 install --verbose --no-index --no-build-isolation --prefix /app *.whl
