name: sbapp
sources:
  - type: file
    url: https://github.com/markqvist/Sideband/releases/download/1.9.8/sbapp-1.9.8-py3-none-any.whl
    sha256: cf92d361134107c6f8bfcc110deba1efb873e4ae1f795b205dcac62194723007
    x-checker-data:
      type: json
      url: https://api.github.com/repos/markqvist/Sideband/releases/latest
      version-query: .tag_name
      url-query: .assets[] | select(.name == ("sbapp-" + $version + "-py3-none-any.whl"))
        | .browser_download_url

buildsystem: simple
builddir: true
build-commands:
  - pip3 install --verbose --no-index --no-build-isolation --prefix /app *.whl
